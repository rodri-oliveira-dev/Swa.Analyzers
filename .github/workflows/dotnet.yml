name: .NET

on:
  push:
    branches: [ "main" ]
    paths:
      - "src/**"
      - "tests/**"
      - "docs/**"
      - ".github/workflows/dotnet.yml"
      - "Directory.Packages.props"
      - ".editorconfig"
      - "README.md"
      - "Swa.Analyzers.slnx"
  pull_request:
    branches: [ "main" ]
    paths:
      - "src/**"
      - "tests/**"
      - "docs/**"
      - ".github/workflows/dotnet.yml"
      - "Directory.Packages.props"
      - ".editorconfig"
      - "README.md"
      - "Swa.Analyzers.slnx"
  workflow_dispatch:

concurrency:
  group: dotnet-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Show .NET info
        run: dotnet --info

      - name: Restore
        run: dotnet restore Swa.Analyzers.slnx

      - name: Build
        run: dotnet build Swa.Analyzers.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test Swa.Analyzers.slnx --configuration Release --no-build --verbosity normal
